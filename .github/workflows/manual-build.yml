name: Swift Manual Build

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref from the actr monorepo.
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build-xcframework:
    uses: ./.github/workflows/build-xcframework.yml
    with:
      source_ref: ${{ inputs.source_ref }}
      build_profile: debug
